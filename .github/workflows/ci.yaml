# ===========================================
# NexusNote CI Pipeline - Quality Gate
# ===========================================
# Runs on: PR → main only
# Build & Deploy is handled by juanie-ci.yml on push to main

name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ============================================
  # Quality Gate - Lint & Type Check
  # ============================================
  quality-gate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type Check
        run: bun run typecheck
