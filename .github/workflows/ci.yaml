# ===========================================
# NexusNote CI Pipeline - Quality Gate
# ===========================================
# Runs on: PR → main only
# Build & deploy are handled by your release platform after merge to main

name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ============================================
  # Quality Gate - Lint & Type Check
  # ============================================
  quality-gate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type Check
        run: bun run typecheck
