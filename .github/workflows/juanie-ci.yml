name: Juanie CI

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

jobs:
  # ============================================
  # Quality Gate - Lint & Type Check
  # ============================================
  quality-gate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type Check
        run: bun run typecheck

  # ============================================
  # Build & Deploy
  # ============================================
  build:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Juanie Build Plan
        id: juanie
        run: |
          set -euo pipefail

          ruby <<'RUBY' "$GITHUB_OUTPUT"
          require 'json'
          require 'yaml'

          output_path = ARGV.fetch(0)
          config = YAML.load_file('juanie.yaml') || {}
          services = Array(config['services'])

          raise 'juanie.yaml must define at least one service' if services.empty?

          release_services = services.map do |service|
            name = service['name'].to_s.strip
            raise 'service.name is required' if name.empty?

            {
              name: name,
              image: ENV.fetch('IMAGE_TAG'),
            }
          end

          build_descriptors = services.map do |service|
            build = service['build'] || {}

            {
              'name' => service['name'].to_s,
              'strategy' => (build['strategy'] || 'auto').to_s,
              'context' => (build['context'] || '.').to_s,
              'dockerfile' => build['dockerfile']&.to_s,
              'target' => build['target']&.to_s,
              'definition' => build['definition']&.to_s,
            }
          end

          canonical = build_descriptors.first
          conflicting = build_descriptors.find do |descriptor|
            %w[strategy context dockerfile target definition].any? do |key|
              descriptor[key] != canonical[key]
            end
          end

          if conflicting
            raise(
              "single-repo Juanie CI requires all services to share one build config; conflicting service=#{conflicting['name']}"
            )
          end

          if canonical['definition'].nil? || canonical['definition'].empty?
            canonical['definition'] = './docker-bake.hcl' if File.file?('docker-bake.hcl')
            canonical['definition'] ||= './docker-bake.json' if File.file?('docker-bake.json')
          end

          if canonical['dockerfile'].nil? || canonical['dockerfile'].empty?
            canonical['dockerfile'] = 'Dockerfile' if File.file?('Dockerfile')
          end

          File.open(output_path, 'a') do |file|
            file.puts('release_services_json<<EOF')
            file.puts(JSON.generate(release_services))
            file.puts('EOF')

            file.puts("build_strategy=#{canonical['strategy']}")
            file.puts("build_context=#{canonical['context']}")
            file.puts("build_dockerfile=#{canonical['dockerfile'] || ''}")
            file.puts("build_target=#{canonical['target'] || ''}")
            file.puts("build_definition=#{canonical['definition'] || ''}")
          end
          RUBY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (Bake Target)
        if: ${{ (steps.juanie.outputs.build_strategy == 'bake' || (steps.juanie.outputs.build_strategy == 'auto' && steps.juanie.outputs.build_definition != '')) && steps.juanie.outputs.build_target != '' }}
        uses: docker/bake-action@v5
        with:
          files: ${{ steps.juanie.outputs.build_definition }}
          targets: ${{ steps.juanie.outputs.build_target }}
          push: true
          set: |
            *.tags=${{ env.IMAGE_TAG }}
            *.args.GIT_SHA=${{ github.sha }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Build and Push (Bake Default)
        if: ${{ (steps.juanie.outputs.build_strategy == 'bake' || (steps.juanie.outputs.build_strategy == 'auto' && steps.juanie.outputs.build_definition != '')) && steps.juanie.outputs.build_target == '' }}
        uses: docker/bake-action@v5
        with:
          files: ${{ steps.juanie.outputs.build_definition }}
          push: true
          set: |
            *.tags=${{ env.IMAGE_TAG }}
            *.args.GIT_SHA=${{ github.sha }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Build and Push (Dockerfile)
        if: ${{ steps.juanie.outputs.build_strategy == 'dockerfile' || (steps.juanie.outputs.build_strategy == 'auto' && steps.juanie.outputs.build_definition == '' && steps.juanie.outputs.build_dockerfile != '') }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.juanie.outputs.build_context }}
          file: ${{ steps.juanie.outputs.build_dockerfile }}
          push: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push (Buildpacks)
        if: ${{ steps.juanie.outputs.build_strategy == 'buildpacks' || (steps.juanie.outputs.build_strategy == 'auto' && steps.juanie.outputs.build_definition == '' && steps.juanie.outputs.build_dockerfile == '') }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workspace" \
            -w /workspace \
            buildpacksio/pack \
            pack build "${{ env.IMAGE_TAG }}" --builder paketobuildpacks/builder-jammy-full --publish

      - name: Verify Published Image
        if: success()
        run: |
          set -euo pipefail

          deadline=$(( $(date +%s) + 180 ))

          while [ "$(date +%s)" -lt "$deadline" ]; do
            if docker buildx imagetools inspect "${{ env.IMAGE_TAG }}" >/dev/null 2>&1; then
              echo "Published image is available: ${{ env.IMAGE_TAG }}"
              exit 0
            fi

            echo "Waiting for image manifest to become visible: ${{ env.IMAGE_TAG }}"
            sleep 5
          done

          echo "Image manifest was not available in registry before release trigger"
          exit 1

      - name: Trigger Juanie Release
        if: success()
        run: |
          set -euo pipefail

          trigger_response="$(curl -fsSX POST "https://juanie.art/api/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "services": ${{ steps.juanie.outputs.release_services_json }}
            }')"

          echo "$trigger_response"

          release_id="$(printf '%s' "$trigger_response" | python3 -c 'import json,sys; print(json.load(sys.stdin)["release"]["id"])')"
          release_path="$(printf '%s' "$trigger_response" | python3 -c 'import json,sys; print(json.load(sys.stdin)["release"].get("releasePath", ""))')"

          if [ -z "$release_id" ]; then
            echo "Juanie did not return a release id"
            exit 1
          fi

          if [ -n "$release_path" ]; then
            echo "Release detail: https://juanie.art${release_path}"
          fi

          deadline=$(( $(date +%s) + 2700 ))

          while [ "$(date +%s)" -lt "$deadline" ]; do
            status_response="$(curl -fsSL "https://juanie.art/api/releases/${release_id}/status" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")"

            status="$(printf '%s' "$status_response" | python3 -c 'import json,sys; print(json.load(sys.stdin)["release"]["status"])')"
            status_label="$(printf '%s' "$status_response" | python3 -c 'import json,sys; print(json.load(sys.stdin)["release"]["statusLabel"])')"
            terminal="$(printf '%s' "$status_response" | python3 -c 'import json,sys; print(str(json.load(sys.stdin)["release"]["terminal"]).lower())')"
            succeeded="$(printf '%s' "$status_response" | python3 -c 'import json,sys; print(str(json.load(sys.stdin)["release"]["succeeded"]).lower())')"
            error_message="$(printf '%s' "$status_response" | python3 -c 'import json,sys; value=json.load(sys.stdin)["release"].get("error"); print(value if value else "")')"

            echo "Juanie release ${release_id}: ${status} (${status_label})"

            if [ "$terminal" = "true" ]; then
              if [ "$succeeded" = "true" ]; then
                echo "Juanie release succeeded"
                exit 0
              fi

              if [ -n "$error_message" ]; then
                echo "Juanie release failed: ${error_message}"
              else
                echo "Juanie release failed with status ${status}"
              fi
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for Juanie release ${release_id}"
          exit 1
