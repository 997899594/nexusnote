name: Juanie CI

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      juanie_source_sha:
        description: Source commit SHA to build
        required: false
        type: string
      juanie_release_ref:
        description: Logical release ref to send back to Juanie
        required: false
        type: string
      juanie_force_full_build:
        description: Reserved for preview bootstrap compatibility
        required: false
        type: string

env:
  IMAGE_REGISTRY: ghcr.io
  JUANIE_SOURCE_SHA: ${{ inputs.juanie_source_sha || github.sha }}
  JUANIE_RELEASE_REF: ${{ inputs.juanie_release_ref || github.ref }}
  IMAGE_TAG: ${{ format('{0}/{1}:sha-{2}', 'ghcr.io', github.repository, inputs.juanie_source_sha || github.sha) }}

jobs:
  quality-gate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.JUANIE_SOURCE_SHA }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  release:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.JUANIE_SOURCE_SHA }}

      - name: Resolve Juanie Build Plan
        id: plan
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          require 'json'
          require 'yaml'

          output_path = ENV.fetch('GITHUB_OUTPUT')
          config = YAML.load_file('juanie.yaml') || {}
          services = Array(config['services'])

          raise 'juanie.yaml must define at least one service' if services.empty?

          service_names = services.map do |service|
            name = service['name'].to_s.strip
            raise 'service.name is required' if name.empty?
            name
          end

          build_descriptors = services.map do |service|
            build = service['build'] || {}
            name = service['name'].to_s.strip

            {
              'name' => name,
              'strategy' => (build['strategy'] || 'auto').to_s.strip,
              'context' => (build['context'] || '.').to_s.strip,
              'dockerfile' => build['dockerfile']&.to_s&.strip,
              'target' => build['target']&.to_s&.strip,
              'definition' => build['definition']&.to_s&.strip,
            }
          end

          canonical = build_descriptors.first
          conflicting = build_descriptors.find do |descriptor|
            %w[strategy context dockerfile definition].any? do |key|
              descriptor[key] != canonical[key]
            end
          end

          if conflicting
            raise(
              "single-repo Juanie CI requires all services to share one build definition; conflicting service=#{conflicting['name']}"
            )
          end

          target_names = build_descriptors.map { |descriptor| descriptor['target'].to_s }.reject(&:empty?)
          multi_target_build = target_names.uniq.length > 1
          image_for = lambda do |service_name|
            base = ENV.fetch('IMAGE_TAG')
            next base unless multi_target_build

            safe_name = service_name.downcase.gsub(/[^a-z0-9_.-]+/, '-').gsub(/\A-+|-+\z/, '')
            "#{base}-#{safe_name}"
          end

          release_services = service_names.map do |name|
            {
              name: name,
              image: image_for.call(name),
            }
          end

          definition = canonical['definition']
          if definition.nil? || definition.empty?
            definition = './docker-bake.hcl' if File.file?('docker-bake.hcl')
            definition ||= './docker-bake.json' if File.file?('docker-bake.json')
          end

          dockerfile = canonical['dockerfile']
          if dockerfile.nil? || dockerfile.empty?
            dockerfile = 'Dockerfile' if File.file?('Dockerfile')
          end

          strategy = canonical['strategy']
          if strategy.empty? || strategy == 'auto'
            strategy =
              if definition && !definition.empty?
                'bake'
              elsif dockerfile && !dockerfile.empty?
                'dockerfile'
              else
                'buildpacks'
              end
          end

          build_kind =
            case strategy
            when 'bake'
              raise 'build.definition is required when build.strategy=bake' if definition.nil? || definition.empty?
              target_names.empty? ? 'bake_default' : 'bake_target'
            when 'dockerfile'
              raise 'build.dockerfile is required when build.strategy=dockerfile' if dockerfile.nil? || dockerfile.empty?
              if multi_target_build
                raise 'single-repo Juanie CI only supports per-service build.target with build.strategy=bake'
              end
              'dockerfile'
            when 'buildpacks'
              'buildpacks'
            else
              raise "Unsupported build strategy: #{strategy}"
            end

          File.open(output_path, 'a') do |file|
            file.puts("release_services_json=#{JSON.generate(release_services)}")
            file.puts("build_kind=#{build_kind}")
            file.puts("build_context=#{canonical['context']}")
            file.puts("build_dockerfile=#{dockerfile || ''}")
            file.puts("build_target=#{target_names.uniq.join(',')}")
            file.puts("build_definition=#{definition || ''}")
            file.puts("published_images_json=#{JSON.generate(release_services.map { |service| service[:image] }.uniq)}")
            if build_kind == 'bake_target'
              file.puts('bake_set<<BAKE_SET')
              build_descriptors.each do |descriptor|
                target = descriptor['target'].to_s
                next if target.empty?

                file.puts("#{target}.tags=#{image_for.call(descriptor['name'])}")
                file.puts("#{target}.args.GIT_SHA=#{ENV.fetch('JUANIE_SOURCE_SHA')}")
                file.puts("#{target}.cache-from=type=gha")
                file.puts("#{target}.cache-to=type=gha,mode=max")
              end
              file.puts('BAKE_SET')
            end
          end
          RUBY

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (Bake Target)
        if: ${{ steps.plan.outputs.build_kind == 'bake_target' }}
        uses: docker/bake-action@v7
        env:
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
        with:
          source: .
          files: ${{ steps.plan.outputs.build_definition }}
          targets: ${{ steps.plan.outputs.build_target }}
          push: true
          set: ${{ steps.plan.outputs.bake_set }}

      - name: Build and Push (Bake Default)
        if: ${{ steps.plan.outputs.build_kind == 'bake_default' }}
        uses: docker/bake-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
        with:
          source: .
          files: ${{ steps.plan.outputs.build_definition }}
          push: true
          set: |
            *.tags=${{ env.IMAGE_TAG }}
            *.args.GIT_SHA=${{ env.JUANIE_SOURCE_SHA }}

      - name: Build and Push (Dockerfile)
        if: ${{ steps.plan.outputs.build_kind == 'dockerfile' }}
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ${{ steps.plan.outputs.build_context }}
          file: ${{ steps.plan.outputs.build_dockerfile }}
          push: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            GIT_SHA=${{ env.JUANIE_SOURCE_SHA }}

      - name: Build and Push (Buildpacks)
        if: ${{ steps.plan.outputs.build_kind == 'buildpacks' }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workspace" \
            -w /workspace \
            buildpacksio/pack \
            pack build "${IMAGE_TAG}" --builder paketobuildpacks/builder-jammy-full --publish

      - name: Verify Published Image
        run: |
          set -euo pipefail

          deadline=$(( $(date +%s) + 180 ))

          images='${{ steps.plan.outputs.published_images_json }}'

          while [ "$(date +%s)" -lt "$deadline" ]; do
            missing=0
            while IFS= read -r image; do
              if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
                echo "Published image is available: $image"
              else
                echo "Waiting for image manifest to become visible: $image"
                missing=1
              fi
            done < <(jq -r '.[]' <<<"$images")

            if [ "$missing" -eq 0 ]; then
              exit 0
            fi

            sleep 5
          done

          echo "Image manifest was not available in registry before release trigger"
          exit 1

      - name: Trigger Juanie Release
        env:
          JUANIE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          release_payload="$(
            jq -cn \
              --arg repository "${GITHUB_REPOSITORY}" \
              --arg sha "${JUANIE_SOURCE_SHA}" \
              --arg ref "${JUANIE_RELEASE_REF}" \
              --argjson services '${{ steps.plan.outputs.release_services_json }}' \
              '{
                repository: $repository,
                sha: $sha,
                ref: $ref,
                services: $services
              }'
          )"

          release_response_file="$(mktemp)"
          release_status="$(
            curl -sS -o "$release_response_file" -w '%{http_code}' -X POST "https://juanie.art/api/releases" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${JUANIE_TOKEN}" \
              -d "$release_payload"
          )"
          release_response="$(cat "$release_response_file")"
          rm -f "$release_response_file"

          echo "$release_response"

          if [ "$release_status" -lt 200 ] || [ "$release_status" -ge 300 ]; then
            echo "Juanie release request failed with HTTP ${release_status}"
            exit 1
          fi

          release_id="$(printf '%s' "$release_response" | jq -r '.release.id')"
          release_path="$(printf '%s' "$release_response" | jq -r '.release.releasePath // empty')"

          [ -n "$release_id" ] && [ "$release_id" != "null" ] || {
            echo "Juanie did not return a release id"
            exit 1
          }

          if [ -n "$release_path" ]; then
            echo "Release detail: https://juanie.art${release_path}"
          fi

          for _ in $(seq 1 270); do
            status_response="$(
              curl -fsSL "https://juanie.art/api/releases/${release_id}/status" \
                -H "Authorization: Bearer ${JUANIE_TOKEN}"
            )"

            status="$(printf '%s' "$status_response" | jq -r '.release.status')"
            status_label="$(printf '%s' "$status_response" | jq -r '.release.statusLabel')"
            resolution="$(printf '%s' "$status_response" | jq -r '.release.resolution')"
            error_message="$(printf '%s' "$status_response" | jq -r '.release.error // empty')"

            echo "Juanie release ${release_id}: ${status} (${status_label})"

            case "$resolution" in
              succeeded)
                exit 0
                ;;
              action_required)
                if [ -n "$release_path" ]; then
                  echo "Juanie release requires manual action: https://juanie.art${release_path}"
                fi
                exit 0
                ;;
              failed)
                [ -n "$error_message" ] && echo "Juanie release failed: ${error_message}"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for Juanie release ${release_id}"
          exit 1
