name: Juanie CI

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (Bake)
        if: ${{ hashFiles('docker-bake.hcl', 'docker-bake.json') != '' }}
        uses: docker/bake-action@v5
        with:
          push: true
          set: |
            *.tags=${{ env.IMAGE_TAG }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Build and Push (Dockerfile)
        if: ${{ hashFiles('docker-bake.hcl', 'docker-bake.json') == '' && hashFiles('Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push (Buildpacks)
        if: ${{ hashFiles('docker-bake.hcl', 'docker-bake.json') == '' && hashFiles('Dockerfile') == '' }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/workspace \
            -w /workspace \
            buildpacksio/pack \
            pack build ${{ env.IMAGE_TAG }} --builder paketobuildpacks/builder-jammy-full --publish

      - name: Sync Database Schema
        if: success()
        run: |
          # Install bun
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"

          # Install dependencies and sync schema
          bun install
          bunx drizzle-kit push --force
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Trigger Juanie Deployment
        if: success()
        run: |
          curl -fsSX POST "https://juanie.art/api/deployments/trigger" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "image": "${{ env.IMAGE_TAG }}"
            }'
