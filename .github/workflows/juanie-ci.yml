name: Juanie CI

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

jobs:
  # ============================================
  # Quality Gate - Lint & Type Check
  # ============================================
  quality-gate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type Check
        run: bun run typecheck

  # ============================================
  # Build & Deploy
  # ============================================
  build:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (Bake)
        if: ${{ hashFiles('docker-bake.hcl', 'docker-bake.json') != '' }}
        uses: docker/bake-action@v5
        with:
          push: true
          set: |
            *.tags=${{ env.IMAGE_TAG }}
            *.args.GIT_SHA=${{ github.sha }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Build and Push (Dockerfile)
        if: ${{ hashFiles('docker-bake.hcl', 'docker-bake.json') == '' && hashFiles('Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push (Buildpacks)
        if: ${{ hashFiles('docker-bake.hcl', 'docker-bake.json') == '' && hashFiles('Dockerfile') == '' }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/workspace \
            -w /workspace \
            buildpacksio/pack \
            pack build ${{ env.IMAGE_TAG }} --builder paketobuildpacks/builder-jammy-full --publish

      - name: Trigger Juanie Release
        if: success()
        run: |
          curl -fsSX POST "https://juanie.art/api/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "services": [
                {
                  "name": "web",
                  "image": "${{ env.IMAGE_TAG }}"
                }
              ]
            }'
