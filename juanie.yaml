# juanie.yaml
name: nexusnote-uclhhb

services:
  - name: web
    type: web
    build:
      command: npm run build
      strategy: bake
      definition: docker-bake.hcl
      context: .
      target: web
    run:
      command: node server.js
      port: 3000
    healthcheck:
      path: /api/health
      interval: 30
    scaling:
      min: 1
    resources:
      cpuRequest: 100m
      cpuLimit: 500m
      memoryRequest: 256Mi
      memoryLimit: 512Mi
    schema:
      source: atlas
      config: atlas.hcl
      executionMode: automatic
      approvalPolicy: manual_in_production
      releaseGraph:
        baselineVersion: "20260714000000"
        expand:
          targetVersion: "20260714010003"
        backfill:
          targetVersion: "20260714020000"
        verify:
          targetVersion: "20260714030000"
        cutover: deployment
        contract:
          targetVersion: "20260714050000"
  - name: worker
    type: worker
    build:
      command: npm run build
      strategy: bake
      definition: docker-bake.hcl
      context: .
      target: worker
    run:
      command: bun .worker-runtime/start-workers.js
    scaling:
      min: 1
    resources:
      cpuRequest: 100m
      cpuLimit: 500m
      memoryRequest: 256Mi
      memoryLimit: 512Mi

databases:
  - name: primary
    type: postgresql
    plan: starter
    scope: project
    role: primary
    capabilities:
      - pg_trgm
      - vector
  - name: redis
    type: redis
    plan: starter
    scope: project
    role: primary

environments:
  production:
    branch: main
  staging:
    branch: main

deliverables:
  - name: nexusnote-web-runtime
    type: archive
    source:
      service: web
    variants:
      - name: linux-amd64
        platform: linux/amd64
        extract:
          from: /app/.
          to: .
        package:
          format: tar.gz
        checks:
          - command: test -f "$JUANIE_ARTIFACT_STAGE/server.js"
          - command: test -d "$JUANIE_ARTIFACT_STAGE/.next"
          - command: test -d "$JUANIE_ARTIFACT_STAGE/public"
          - command: test ! -f "$JUANIE_ARTIFACT_STAGE/scripts/start.mjs"
  - name: nexusnote-worker-runtime
    type: archive
    source:
      service: worker
    variants:
      - name: linux-amd64
        platform: linux/amd64
        extract:
          from: /app/.
          to: .
        package:
          format: tar.gz
        checks:
          - command: test -f "$JUANIE_ARTIFACT_STAGE/package.json"
          - command: test -f "$JUANIE_ARTIFACT_STAGE/.worker-runtime/start-workers.js"
          - command: test -d "$JUANIE_ARTIFACT_STAGE/lib/ai/prompts/resources"
          - command: test ! -d "$JUANIE_ARTIFACT_STAGE/app"
