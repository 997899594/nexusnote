# juanie.yaml
name: find-kaqmxe

services:
  - name: web
    type: web
    build:
      command: npm run build
      strategy: bake
      definition: docker-bake.hcl
      context: .
      target: web
    run:
      command: npm start
      port: 3000
    healthcheck:
      path: /api/health
      interval: 30
    scaling:
      min: 1
    resources:
      cpuRequest: 100m
      cpuLimit: 500m
      memoryRequest: 256Mi
      memoryLimit: 512Mi
    # Auto-generated from package.json script db:push; review before enabling auto-run
    migrate:
      tool: drizzle
      workingDirectory: .
      command: bun run db:push
      phase: preDeploy
      autoRun: false
      approvalPolicy: manual_in_production

databases:
  - name: primary
    type: postgresql
    plan: standard
    scope: project
    role: primary

environments:
  production:
    branch: main
  staging:
    branch: main
