services:
  - name: web
    type: web
    build:
      command: bun run build
      dockerfile: Dockerfile.web
      context: .
    run:
      command: bun run start
      port: 3000
    healthcheck:
      path: /api/health
      interval: 30
    scaling:
      min: 1
      max: 5
      cpu: 80
    migrate:
      tool: drizzle
      workingDirectory: .
      command: bun run db:migrate
      phase: preDeploy
      autoRun: true
      approvalPolicy: manual_in_production

databases:
  - name: postgres
    type: postgresql
    plan: standard
    scope: project
    role: primary

environments:
  production:
    branch: main
    variables:
      NODE_ENV: production
